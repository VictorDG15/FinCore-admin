<div class="fc-page">
  <app-page-header
    title="Internal Users"
    subtitle="Manage backoffice users, operational roles and access states."
    icon="pi pi-shield">
    <button pButton type="button" label="New user" icon="pi pi-user-plus" (click)="createUser()"></button>
  </app-page-header>

  <app-loading *ngIf="loading"></app-loading>

  <app-data-table-wrapper *ngIf="!loading" title="User directory" subtitle="Roles available: ADMIN, ANALYST and MANAGER.">
    <div table-actions><app-search-box placeholder="Search by user, email or department" (search)="searchTerm = $event"></app-search-box></div>
    <p-table [value]="filteredUsers" [paginator]="true" [rows]="6" responsiveLayout="stack" [breakpoint]="'960px'">
      <ng-template pTemplate="header">
        <tr>
          <th>User</th>
          <th>Role</th>
          <th>Department</th>
          <th>Last access</th>
          <th>Status</th>
          <th class="text-end">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <div class="user-cell">
              <div class="avatar">{{ user.fullName | initials }}</div>
              <div><strong>{{ user.fullName }}</strong><small>{{ user.email }}</small></div>
            </div>
          </td>
          <td><span class="role-chip">{{ user.role }}</span></td>
          <td>{{ user.department }}</td>
          <td>{{ user.lastAccess | date:'medium' }}</td>
          <td><app-status-badge [value]="user.status"></app-status-badge></td>
          <td class="text-end"><button pButton type="button" icon="pi pi-pencil" class="p-button-text" (click)="editUser(user)"></button></td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6"><app-empty-state title="No users found" description="Try searching another role, name or department."></app-empty-state></td></tr>
      </ng-template>
    </p-table>
  </app-data-table-wrapper>

  <app-user-form-dialog [visible]="formVisible" [user]="selectedUser" (closed)="closeForm()"></app-user-form-dialog>
</div>

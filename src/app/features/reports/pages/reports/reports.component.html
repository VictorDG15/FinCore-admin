<div class="fc-page">
  <app-page-header
    title="Financial Reports"
    subtitle="Professional reporting view with date filters, summary cards, charts and export-ready tables."
    icon="pi pi-file-export">
    <button pButton type="button" label="Download PDF" icon="pi pi-download" class="p-button-outlined"></button>
  </app-page-header>

  <app-loading *ngIf="loading"></app-loading>

  <ng-container *ngIf="!loading">
    <section class="filters fc-card" [formGroup]="filterForm">
      <div><label>From date</label><p-calendar formControlName="fromDate" dateFormat="yy-mm-dd" [showIcon]="true"></p-calendar></div>
      <div><label>To date</label><p-calendar formControlName="toDate" dateFormat="yy-mm-dd" [showIcon]="true"></p-calendar></div>
      <div><label>Category</label><p-dropdown formControlName="category" [options]="categories"></p-dropdown></div>
      <div class="report-note"><i class="pi pi-info-circle"></i><span>Mock data generated locally. No external API is consumed.</span></div>
    </section>

    <section class="summary-grid">
      <app-kpi-card *ngFor="let kpi of kpis" [data]="kpi"></app-kpi-card>
    </section>

    <section class="report-layout">
      <div class="fc-card chart-card">
        <div class="heading"><span class="fc-section-title">Performance</span><h2>Income vs expenses</h2></div>
        <p-chart type="bar" [data]="chartData" height="300px"></p-chart>
      </div>

      <app-data-table-wrapper title="Report results" subtitle="Filtered operational and financial metrics.">
        <p-table [value]="filteredRows" responsiveLayout="stack" [breakpoint]="'960px'">
          <ng-template pTemplate="header">
            <tr>
              <th>Metric</th>
              <th>Category</th>
              <th>Period</th>
              <th>Amount</th>
              <th>Variation</th>
              <th>Owner</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-row>
            <tr>
              <td><strong>{{ row.metric }}</strong></td>
              <td>{{ row.category }}</td>
              <td>{{ row.period }}</td>
              <td>{{ row.amount | number:'1.0-2' }}</td>
              <td><span class="variation" [class.positive]="row.variation >= 0">{{ row.variation }}%</span></td>
              <td>{{ row.owner }}</td>
            </tr>
          </ng-template>
        </p-table>
      </app-data-table-wrapper>
    </section>
  </ng-container>
</div>
